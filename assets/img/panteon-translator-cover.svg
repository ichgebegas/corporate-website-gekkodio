<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Strumento di Traduzione dashboard</title>
  <desc id="desc">Interface mockup for a liturgical readings translation tool.</desc>
  <rect width="1600" height="900" fill="#fbfbfb"/>
  <rect y="0" width="1600" height="58" fill="#ffffff"/>
  <line x1="0" y1="58" x2="1600" y2="58" stroke="#e8e8e8"/>
  <text x="232" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Strumento di Traduzione</text>
  <text x="1124" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111111">Vista Pubblica</text>
  <text x="1245" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111111">Dashboard</text>
  <rect x="1320" y="14" width="45" height="30" rx="7" fill="#111111"/>
  <text x="1334" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Esci</text>

  <rect x="430" y="88" width="740" height="760" rx="10" fill="#ffffff" stroke="#d9dfe7"/>
  <text x="450" y="126" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Inserisci Testo Italiano</text>
  <text x="450" y="151" font-family="Arial, sans-serif" font-size="12" fill="#667085">Ultimo aggiornamento: 11/04/2026, 12:44:14</text>

  <text x="450" y="196" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Immagini introduttive</text>
  <text x="450" y="225" font-family="Arial, sans-serif" font-size="11" fill="#667085">Immagini esistenti:</text>
  <rect x="450" y="236" width="62" height="62" fill="#f4ede2" stroke="#d9dfe7"/>
  <rect x="458" y="244" width="46" height="28" fill="#c49a5f"/>
  <rect x="460" y="276" width="42" height="13" fill="#ffffff" opacity=".8"/>
  <text x="450" y="324" font-family="Arial, sans-serif" font-size="12" fill="#667085">↥  Aggiungi nuova immagine (max 3)</text>
  <rect x="450" y="335" width="700" height="31" rx="6" fill="#f7f8fa" stroke="#d9dfe7"/>
  <text x="470" y="355" font-family="Arial, sans-serif" font-size="12" fill="#344054">Choose File</text>
  <text x="552" y="355" font-family="Arial, sans-serif" font-size="12" fill="#667085">No file chosen</text>

  <text x="450" y="404" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Prima lettura</text>
  <rect x="450" y="418" width="700" height="83" rx="4" fill="#ffffff" stroke="#d9dfe7"/>
  <text x="468" y="443" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dal libro della Genesi</text>
  <text x="468" y="476" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dopo che l'uomo ebbe mangiato del frutto dell'albero, il Signore Dio lo chiamò...</text>
  <rect x="1138" y="430" width="7" height="46" rx="4" fill="#8a8f98"/>
  <text x="450" y="528" font-family="Arial, sans-serif" font-size="11" fill="#667085">Immagini esistenti:</text>
  <rect x="450" y="538" width="60" height="42" fill="#f5f5f5" stroke="#d9dfe7"/>
  <rect x="520" y="538" width="60" height="42" fill="#fff7f2" stroke="#d9dfe7"/>
  <rect x="590" y="538" width="60" height="42" fill="#f9fafb" stroke="#d9dfe7"/>

  <text x="450" y="646" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Seconda lettura</text>
  <rect x="450" y="660" width="700" height="83" rx="4" fill="#ffffff" stroke="#d9dfe7"/>
  <text x="468" y="685" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dalla lettera di san Paolo apostolo agli Efesini</text>
  <text x="468" y="718" font-family="Arial, sans-serif" font-size="12" fill="#344054">Benedetto Dio, Padre del Signore nostro Gesù Cristo...</text>
  <rect x="1138" y="672" width="7" height="46" rx="4" fill="#8a8f98"/>
  <rect x="450" y="763" width="60" height="42" fill="#f5f5f5" stroke="#d9dfe7"/>
  <rect x="520" y="763" width="60" height="42" fill="#fff7f2" stroke="#d9dfe7"/>
  <rect x="590" y="763" width="60" height="42" fill="#f9fafb" stroke="#d9dfe7"/>
</svg>
