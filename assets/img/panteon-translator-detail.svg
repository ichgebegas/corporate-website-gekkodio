<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Translation tool detail screen</title>
  <desc id="desc">Detailed interface mockup for editing Italian liturgical readings.</desc>
  <rect width="1600" height="900" fill="#fbfbfb"/>
  <rect y="0" width="1600" height="58" fill="#ffffff"/>
  <line x1="0" y1="58" x2="1600" y2="58" stroke="#e8e8e8"/>
  <text x="232" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Strumento di Traduzione</text>
  <text x="1124" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111111">Vista Pubblica</text>
  <text x="1245" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111111">Dashboard</text>
  <rect x="1320" y="14" width="45" height="30" rx="7" fill="#111111"/>
  <text x="1334" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Esci</text>

  <rect x="430" y="88" width="740" height="760" rx="10" fill="#ffffff" stroke="#d9dfe7"/>
  <text x="450" y="126" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Inserisci Testo Italiano</text>
  <text x="450" y="151" font-family="Arial, sans-serif" font-size="12" fill="#667085">Ultimo aggiornamento: 11/04/2026, 12:44:14</text>

  <g transform="translate(450 190)">
    <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Prima lettura</text>
    <rect y="16" width="700" height="88" rx="4" fill="#ffffff" stroke="#d9dfe7"/>
    <text x="18" y="42" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dal libro della Genesi</text>
    <text x="18" y="72" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dopo che l'uomo ebbe mangiato del frutto dell'albero, il Signore Dio lo chiamò...</text>
    <rect x="688" y="28" width="7" height="48" rx="4" fill="#8a8f98"/>
    <text y="133" font-family="Arial, sans-serif" font-size="11" fill="#667085">Immagini esistenti:</text>
    <rect y="144" width="60" height="42" fill="#f4f4f4" stroke="#d9dfe7"/>
    <rect x="70" y="144" width="60" height="42" fill="#fff3ef" stroke="#d9dfe7"/>
    <rect x="140" y="144" width="60" height="42" fill="#f9fafb" stroke="#d9dfe7"/>
    <text y="213" font-family="Arial, sans-serif" font-size="12" fill="#667085">↥  Aggiungi nuova immagine (max 3)</text>
    <rect y="224" width="700" height="31" rx="6" fill="#f7f8fa" stroke="#d9dfe7"/>
    <text x="20" y="244" font-family="Arial, sans-serif" font-size="12" fill="#344054">Choose File</text>
    <text x="102" y="244" font-family="Arial, sans-serif" font-size="12" fill="#667085">No file chosen</text>
  </g>

  <g transform="translate(450 490)">
    <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Seconda lettura</text>
    <rect y="16" width="700" height="88" rx="4" fill="#ffffff" stroke="#d9dfe7"/>
    <text x="18" y="42" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dalla lettera di san Paolo apostolo agli Efesini</text>
    <text x="18" y="72" font-family="Arial, sans-serif" font-size="12" fill="#344054">Benedetto Dio, Padre del Signore nostro Gesù Cristo...</text>
    <rect x="688" y="28" width="7" height="48" rx="4" fill="#8a8f98"/>
    <text y="133" font-family="Arial, sans-serif" font-size="11" fill="#667085">Immagini esistenti:</text>
    <rect y="144" width="60" height="42" fill="#f4f4f4" stroke="#d9dfe7"/>
    <rect x="70" y="144" width="60" height="42" fill="#fff3ef" stroke="#d9dfe7"/>
    <rect x="140" y="144" width="60" height="42" fill="#f9fafb" stroke="#d9dfe7"/>
    <rect x="210" y="144" width="60" height="42" fill="#f5ecd2" stroke="#d9dfe7"/>
    <text y="213" font-family="Arial, sans-serif" font-size="12" fill="#667085">↥  Aggiungi nuova immagine (max 3)</text>
  </g>

  <g transform="translate(450 790)">
    <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111111">Vangelo</text>
    <rect y="16" width="700" height="64" rx="4" fill="#ffffff" stroke="#d9dfe7"/>
    <text x="18" y="42" font-family="Arial, sans-serif" font-size="12" fill="#344054">Dal Vangelo secondo Luca</text>
    <rect x="688" y="28" width="7" height="34" rx="4" fill="#8a8f98"/>
  </g>
</svg>
